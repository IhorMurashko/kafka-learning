server:
  port: 0
spring:
  application:
    name: transactional-service
  kafka:
    bootstrap-servers: localhost:19092,localhost:19093,localhost:19094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      transaction-id-prefix: transactional-service-${random.value}-

      #      retries: 10
      properties:
        #        retry.backoff.ms: 1000
        delivery.timeout.ms: 20000
        linger.ms: 0
        request.timeout.ms: 10000
        enable.idempotence: true
    consumer:
      properties:
        spring.json.trusted.packages: com.example.core.dto.event.*
      isolation-level: read_committed
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: jdbc:h2:mem:h2
    username: h2
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    org.springframework.kafka: INFO
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa.JpaTransactionManager: INFO

    org.apache.kafka.clients.producer: INFO
    org.apache.kafka.clients.producer.internals.TransactionManager: INFO
    org.apache.kafka.clients.consumer: INFO